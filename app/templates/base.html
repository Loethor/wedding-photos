<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>{% block title %}Luis &amp; Cristina{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f6f1e8;
            --bg-sage: #c9cabf;
            --ink: #3d4a33;
            --ink-2: #55604a;
            --ink-soft: #8a9080;
            --card: #fffdf8;
            --line: rgba(61, 74, 51, .14);
            --shadow: 0 1px 2px rgba(61, 74, 51, .06), 0 14px 40px -18px rgba(61, 74, 51, .28);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            font-family: "Mulish", system-ui, sans-serif;
            color: var(--ink);
            background: var(--bg);
            line-height: 1.6;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: var(--ink);
            text-decoration: none;
        }

        a:hover {
            color: var(--ink-2);
        }

        h1,
        h2,
        h3 {
            font-family: "Cormorant Garamond", Georgia, serif;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: .01em;
            line-height: 1.08;
            margin: 0;
        }

        img {
            display: block;
            max-width: 100%;
        }

        /* ---- top bar ---- */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(246, 241, 232, .82);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }

        .topbar-inner {
            max-width: 1120px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            font-family: "Cormorant Garamond", serif;
            font-size: 25px;
            font-weight: 600;
            letter-spacing: .02em;
            white-space: nowrap;
        }

        .brand span {
            font-style: italic;
            font-weight: 500;
        }

        .navlinks {
            display: flex;
            gap: 6px;
        }

        .navlink {
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14.5px;
            font-weight: 600;
            color: var(--ink-2);
            transition: background .15s, color .15s;
        }

        .navlink:hover {
            background: rgba(61, 74, 51, .07);
            color: var(--ink);
        }

        .navlink.active {
            background: var(--ink);
            color: #fff;
        }

        .navlink.active:hover {
            color: #fff;
        }

        /* ---- layout ---- */
        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 48px 24px 96px;
        }

        .page-head {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-head .eyebrow {
            font-size: 12.5px;
            font-weight: 700;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 12px;
        }

        .page-head h1 {
            font-size: clamp(38px, 6vw, 58px);
        }

        .page-head p {
            margin: 12px auto 0;
            max-width: 42ch;
            color: var(--ink-2);
        }

        /* ---- buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 13px 24px;
            border-radius: 999px;
            font-family: "Mulish", sans-serif;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid transparent;
            cursor: pointer;
            transition: transform .12s, background .15s, box-shadow .15s, border-color .15s;
        }

        .btn-primary {
            background: var(--ink);
            color: #fff;
        }

        .btn-primary:hover {
            color: #fff;
            box-shadow: 0 10px 26px -12px rgba(61, 74, 51, .7);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink);
            border-color: var(--line);
        }

        .btn-ghost:hover {
            background: rgba(61, 74, 51, .06);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 14px;
            font-weight: 600;
            color: var(--ink-soft);
            margin-bottom: 22px;
        }

        .back-link:hover {
            color: var(--ink);
        }

        /* ---- gallery grid ---- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .tile {
            position: relative;
            display: block;
            border: none;
            padding: 0;
            margin: 0;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-sage);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .tile img,
        .tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s cubic-bezier(.2, .7, .2, 1);
        }

        .tile:hover img {
            transform: scale(1.06);
        }

        .tile .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: rgba(61, 74, 51, .68);
            color: #fff;
            display: grid;
            place-items: center;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        .tile .caption {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 26px 12px 9px;
            font-size: 12.5px;
            font-weight: 600;
            color: #fff;
            text-align: left;
            background: linear-gradient(to top, rgba(35, 42, 28, .8), transparent);
            opacity: 0;
            transition: opacity .2s;
        }

        .tile:hover .caption {
            opacity: 1;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-soft);
            border: 1px dashed var(--line);
            border-radius: var(--radius);
            background: var(--card);
        }

        /* ---- lightbox ---- */
        .lb {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(31, 37, 25, .94);
            display: none;
            flex-direction: column;
        }

        .lb.open {
            display: flex;
        }

        .lb-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            color: rgba(255, 255, 255, .9);
            gap: 16px;
        }

        .lb-meta {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: .02em;
            min-width: 0;
        }

        .lb-meta .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lb-meta .who {
            color: rgba(255, 255, 255, .55);
            font-weight: 500;
            font-size: 12.5px;
        }

        .lb-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lb-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, .12);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 9px 16px;
            font-family: "Mulish", sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }

        .lb-btn:hover {
            background: rgba(255, 255, 255, .22);
            color: #fff;
        }

        .lb-icon {
            width: 42px;
            height: 42px;
            padding: 0;
            justify-content: center;
            border-radius: 999px;
        }

        .lb-stage {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 72px 24px;
            min-height: 0;
            touch-action: pan-y;
        }

        /* El div que envuelve la imagen debe llenar el escenario para que el
           max-height de la imagen tenga contra qué resolverse (si no, la
           imagen se muestra a tamaño natural y desborda la pantalla). */
        #lb-media {
            flex: 1;
            align-self: stretch;
            min-width: 0;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-stage img,
        .lb-stage video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 30px 80px -30px rgba(0, 0, 0, .8);
        }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 52px;
            height: 52px;
            border-radius: 999px;
            border: none;
            background: rgba(255, 255, 255, .14);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: background .15s;
        }

        .lb-nav:hover {
            background: rgba(255, 255, 255, .26);
        }

        .lb-nav.prev {
            left: 18px;
        }

        .lb-nav.next {
            right: 18px;
        }

        .lb-nav[hidden] {
            display: none;
        }

        .lb svg {
            display: block;
        }

        @media (max-width: 600px) {
            .wrap {
                padding: 32px 16px 80px;
            }

            .topbar-inner {
                padding: 12px 16px;
            }

            .brand {
                font-size: 21px;
            }

            .navlink {
                padding: 7px 12px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 8px;
            }

            .lb-stage {
                padding: 8px 10px 18px;
            }

            .lb-nav {
                width: 44px;
                height: 44px;
            }

            .lb-nav.prev {
                left: 6px;
            }

            .lb-nav.next {
                right: 6px;
            }

            .lb-btn span.label {
                display: none;
            }

            .lb-btn {
                padding: 9px;
            }
        }

        @media (max-width: 400px) {
            .topbar-inner {
                padding: 11px 14px;
                gap: 10px;
            }

            .brand {
                font-size: 19px;
            }

            .navlinks {
                gap: 4px;
            }

            .navlink {
                padding: 7px 11px;
                font-size: 13.5px;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/">Luis <span>&amp;</span> Cristina</a>
            <nav class="navlinks">
                <a class="navlink {% block nav_upload %}{% endblock %}" href="/">Subir fotos</a>
                <a class="navlink {% block nav_gallery %}{% endblock %}" href="/gallery">Galería</a>
            </nav>
        </div>
    </header>

    <main class="wrap">
        {% block content %}{% endblock %}
    </main>

    <!-- lightbox -->
    <div class="lb" id="lightbox" aria-hidden="true">
        <div class="lb-bar">
            <div class="lb-meta">
                <div class="name" id="lb-name"></div>
                <div class="who" id="lb-who"></div>
            </div>
            <div class="lb-actions">
                <div class="lb-meta" id="lb-count" style="margin-right:6px"></div>
                <a class="lb-btn" id="lb-download" href="#" download>
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3v12m0 0 4-4m-4 4-4-4M4 21h16" />
                    </svg>
                    <span class="label">Descargar</span>
                </a>
                <button class="lb-btn lb-icon" id="lb-close" aria-label="Cerrar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M6 6l12 12M18 6 6 18" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="lb-stage" id="lb-stage">
            <button class="lb-nav prev" id="lb-prev" aria-label="Anterior">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 5l-7 7 7 7" />
                </svg>
            </button>
            <div id="lb-media"></div>
            <button class="lb-nav next" id="lb-next" aria-label="Siguiente">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        (function () {
            const dataEl = document.getElementById("gallery-data");
            if (!dataEl) return;
            const items = JSON.parse(dataEl.textContent || "[]");
            if (!items.length) return;

            const lb = document.getElementById("lightbox");
            const media = document.getElementById("lb-media");
            const nameEl = document.getElementById("lb-name");
            const whoEl = document.getElementById("lb-who");
            const countEl = document.getElementById("lb-count");
            const dl = document.getElementById("lb-download");
            const prev = document.getElementById("lb-prev");
            const next = document.getElementById("lb-next");
            let i = 0;

            function render() {
                const it = items[i];
                media.innerHTML = "";
                let node;
                if (it.type === "video") {
                    node = document.createElement("video");
                    node.src = it.full;
                    node.controls = true;
                    node.autoplay = true;
                    node.playsInline = true;
                } else {
                    node = document.createElement("img");
                    node.src = it.full;
                    node.alt = it.name;
                }
                media.appendChild(node);
                nameEl.textContent = it.name;
                whoEl.textContent = it.who || "";
                countEl.textContent = (i + 1) + " / " + items.length;
                dl.href = it.download;
                const single = items.length < 2;
                prev.hidden = single;
                next.hidden = single;
            }

            function open(idx) {
                i = idx;
                lb.classList.add("open");
                lb.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
                render();
            }

            function close() {
                lb.classList.remove("open");
                lb.setAttribute("aria-hidden", "true");
                document.body.style.overflow = "";
                media.innerHTML = "";
            }

            function go(d) {
                i = (i + d + items.length) % items.length;
                render();
            }

            document.querySelectorAll("[data-index]").forEach(function (el) {
                el.addEventListener("click", function () {
                    open(parseInt(el.getAttribute("data-index"), 10));
                });
            });

            document.getElementById("lb-close").addEventListener("click", close);
            prev.addEventListener("click", function () { go(-1); });
            next.addEventListener("click", function () { go(1); });
            lb.addEventListener("click", function (e) {
                if (e.target === lb || e.target.id === "lb-stage") close();
            });
            document.addEventListener("keydown", function (e) {
                if (!lb.classList.contains("open")) return;
                if (e.key === "Escape") close();
                else if (e.key === "ArrowLeft") go(-1);
                else if (e.key === "ArrowRight") go(1);
            });

            // swipe
            let sx = 0, sy = 0;
            const stage = document.getElementById("lb-stage");
            stage.addEventListener("touchstart", function (e) {
                sx = e.touches[0].clientX; sy = e.touches[0].clientY;
            }, { passive: true });
            stage.addEventListener("touchend", function (e) {
                const dx = e.changedTouches[0].clientX - sx;
                const dy = e.changedTouches[0].clientY - sy;
                if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? 1 : -1);
            }, { passive: true });
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
