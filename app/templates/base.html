<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}Wedding Photos{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .nav {
            margin-bottom: 20px;
        }

        .button {
            display: inline-block;
            padding: 12px 18px;
            font-size: 16px;
            background: #eee;
            border-radius: 8px;
            text-decoration: none;
            color: black;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill,
                    minmax(150px, 1fr));
            gap: 10px;
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <div class="nav">
        <a class="button" href="/">
            🏠 Home
        </a>

        <a class="button" href="/gallery">
            🖼 Gallery
        </a>
    </div>


    {% block content %}
    {% endblock %}


</body>

</html>
