{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>🔒 Wedding Photos</h1>

<p>
    Please enter the wedding password.
</p>

{% if error %}
<p style="color:red">
    Incorrect password.
</p>
{% endif %}

<form action="/login" method="post">

    <input type="password" name="password" placeholder="Password" required>

    <br><br>

    <button type="submit">
        Enter
    </button>

</form>

{% endblock %}
