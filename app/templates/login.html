{% extends "base.html" %}

{% block title %}{{ t("titles.login") }} · Luis &amp; Cristina{% endblock %}

{% block content %}

<div class="login-wrap">
    <div class="date">{{ t("login.date") }}</div>
    <h1 class="names">Luis <span class="amp">&amp;</span> Cristina</h1>
    <div class="login-card">
        <div class="lock">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        </div>
        <h2>{{ t("login.heading") }}</h2>
        <p class="hint">{{ t("login.hint") }}</p>

        {% if error %}
        <p class="err">{{ t("login.wrong_password") }}</p>
        {% endif %}

        <form action="/login" method="post">
            <input type="password" name="password" placeholder="{{ t('login.password_placeholder') }}" required autofocus>
            <button type="submit" class="btn btn-primary">{{ t("login.submit") }}</button>
        </form>
    </div>
</div>

{% endblock %}
