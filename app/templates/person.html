{% extends "base.html" %}

{% block title %}
{{ person }}
{% endblock %}


{% block content %}

<a class="button" href="/gallery">
    ← People
</a>

<h1>{{ person }}</h1>

<div class="gallery">

    {% for file in files %}

    <a href="/photo/{{ person }}/{{ file.name }}">
        <img src="/thumbnail/{{ person }}/{{ file.name }}" alt="{{ file.name }}">
    </a>

    {% endfor %}

</div>

{% endblock %}
