{% extends "base.html" %}

{% block title %}{{ t("titles.home") }} · Luis &amp; Cristina{% endblock %}
{% block nav_upload %}active{% endblock %}

{% block content %}

<div class="hero">
    <div class="date">{{ t("home.date") }}</div>
    <h1>Luis <span class="amp">&amp;</span> Cristina</h1>
    <p class="lede">{{ t("home.lede") }}</p>
</div>

<div class="upload-card">
    <form id="upload-form">
        <div class="field-row">
            <label class="field">
                <span class="lbl">{{ t("home.first_name") }}</span>
                <input name="first_name" type="text" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ]+" title="{{ t('home.one_word') }}" placeholder="{{ t('home.first_name_placeholder') }}" autocomplete="given-name">
            </label>
            <label class="field">
                <span class="lbl">{{ t("home.last_name") }}</span>
                <input name="last_name" type="text" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ]+" title="{{ t('home.one_word') }}" placeholder="{{ t('home.last_name_placeholder') }}" autocomplete="family-name">
            </label>
        </div>

        <label class="dropzone" id="dropzone">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 16V4m0 0 4 4m-4-4L8 8" />
                <path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" />
            </svg>
            <div class="dz-title">{{ t("home.dropzone_title") }}</div>
            <div class="dz-sub">{{ t("home.dropzone_sub") }}</div>
            <input id="files" type="file" name="files" multiple accept="image/*,video/*" required>
        </label>

        <div class="filelist" id="filelist"></div>

        <div class="submit-row">
            <button type="submit" class="btn btn-primary" id="submit-btn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5m0 0 6 6m-6-6L6 11"/></svg>
                {{ t("home.submit") }}
            </button>
        </div>

        <div class="progress" id="progress"><div class="bar" id="bar"></div></div>
        <p id="status"></p>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/upload.js" defer></script>
{% endblock %}
