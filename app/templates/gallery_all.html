{% extends "base.html" %}

{% block title %}
All Photos
{% endblock %}


{% block content %}

<a class="button" href="/gallery">
    ← Gallery
</a>

<h1>📸 All photos</h1>

<div class="gallery">

    {% for person, file in files %}

    <a href="/photo/{{ person }}/{{ file.name }}">
        <img src="/thumbnail/{{ person }}/{{ file.name }}" alt="{{ file.name }}">

    </a>

    {% endfor %}

</div>

{% endblock %}
