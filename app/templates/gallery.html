{% extends "base.html" %}

{% block title %}
Gallery
{% endblock %}


{% block content %}

<h1>🖼 Wedding Gallery</h1>


<a class="button" href="/gallery/all">
    📸 All photos
</a>


<h2>People</h2>

<ul>

    {% for person in people %}

    <li>
        <a href="/gallery/{{ person }}">
            {{ person }}
        </a>
    </li>

    {% endfor %}

</ul>


{% endblock %}
